<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icons/icon-192x192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <title>Nudge - Listes de cadeaux</title>
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Nudge" />
    <meta name="theme-color" content="#FEF8F3" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
      #splash {
        position: fixed;
        inset: 0;
        background: #FEF8F3;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        z-index: 9999;
        transition: opacity 0.3s ease;
      }
      #splash.hidden { opacity: 0; pointer-events: none; }
      #splash-logo {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      #splash-name {
        font-family: 'Nunito', system-ui, sans-serif;
        font-size: 32px;
        font-weight: 900;
        color: #2D8C85;
      }
      #splash-spinner {
        width: 24px;
        height: 24px;
        border: 2.5px solid rgba(45,140,133,0.2);
        border-top-color: #2D8C85;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body class="bg-sand min-h-screen">
    <div id="splash">
      <div id="splash-logo">
        <svg width="36" height="36" viewBox="0 0 40 40" fill="none">
          <circle cx="20" cy="20" r="15" fill="#A5C8BF"/>
          <circle cx="20" cy="20" r="10" fill="#EED7CF"/>
          <circle cx="20" cy="20" r="5" fill="#E9ACB2"/>
          <circle cx="20" cy="20" r="2" fill="#FEF8F3"/>
        </svg>
        <span id="splash-name">Nudge</span>
      </div>
      <div id="splash-spinner"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
